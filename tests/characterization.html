<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>きずなbaton characterization</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:24px;background:#f7f7f8;color:#222}
    h1{font-size:20px;margin:0 0 16px}
    #result{font-weight:700;margin:16px 0;padding:12px;border-radius:8px;background:#fff}
    .pass{color:#137333}
    .fail{color:#b3261e}
    table{border-collapse:collapse;background:#fff;width:100%;max-width:960px}
    th,td{border:1px solid #ddd;padding:6px 8px;text-align:left;vertical-align:top;font-size:13px}
    pre{white-space:pre-wrap;word-break:break-word;background:#fff;border:1px solid #ddd;padding:12px;max-height:520px;overflow:auto}
    iframe{width:1px;height:1px;position:absolute;left:-9999px;top:-9999px}
  </style>
</head>
<body>
  <h1>きずなbaton characterization</h1>
  <div id="result">RUNNING</div>
  <table>
    <thead><tr><th>ID</th><th>Result</th><th>Detail</th></tr></thead>
    <tbody id="log"></tbody>
  </table>
  <pre id="capture"></pre>
  <iframe id="app"></iframe>
  <script>
    const SHIM = `<script>
    (function(){
      const R = Date, FIXED = new R(2026, 6, 15, 9, 0, 0);
      window.Date = class extends R {
        constructor(...a){ super(...(a.length ? a : [FIXED.getTime()])); }
        static now(){ return FIXED.getTime(); }
      };
    })();
    <\/script>
    `;

    const tests = [];
    const snapshots = {};
    const captureMode = new URLSearchParams(location.search).has('capture');

    function add(id, fn){tests.push({id, fn});}
    function deepEqual(a, b){return JSON.stringify(a) === JSON.stringify(b);}
    function normalizeStoredState(json){
      const data = JSON.parse(json);
      delete data.savedAt;
      return data;
    }
    function log(id, ok, detail){
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${id}</td><td class="${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</td><td>${String(detail || '')}</td>`;
      document.getElementById('log').appendChild(tr);
    }
    function assertEqual(actual, expected){
      if(actual !== expected) throw new Error(`expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    }
    function assertDeepEqual(actual, expected){
      if(!deepEqual(actual, expected)) throw new Error(`expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    }
    function waitFor(fn, timeout = 5000){
      const start = performance.now();
      return new Promise((resolve, reject) => {
        function tick(){
          try{
            const v = fn();
            if(v) return resolve(v);
          }catch(e){}
          if(performance.now() - start > timeout) return reject(new Error('timeout'));
          setTimeout(tick, 50);
        }
        tick();
      });
    }

    async function loadApp(){
      localStorage.clear();
      // cache:'no-store'＝ブラウザHTTPキャッシュの旧版を掴んで偽FAIL/偽PASSになるのを防ぐ（v95で実害確認済み）
      const html = await fetch('/shukatsu-prototype.html', {cache:'no-store'}).then(r => r.text());
      const iframe = document.getElementById('app');
      iframe.srcdoc = html.replace('<script>', SHIM + '<script>');
      await new Promise(resolve => iframe.onload = resolve);
      const W = iframe.contentWindow;
      await waitFor(() => W.document.querySelector('#contract-list') && W.document.querySelector('#contract-list').children.length);
      return W;
    }

    async function run(){
      const W = await loadApp();

      add('T01', () => assertEqual(W.esc('<a b="c">&\''), '&lt;a b=&quot;c&quot;&gt;&amp;&#39;'));
      add('T02', () => assertEqual(W.esc(null), ''));
      add('T03', () => assertDeepEqual(W.getVisibility({}), {mode:'all',liveViewers:[],afterViewers:[]}));
      add('T04', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'private'}},'m1','live'), true));
      add('T05', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'private'}},'m2','live'), false));
      add('T06', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'all'}},'m2','live'), true));
      add('T07', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'after_only'}},'m2','live'), false));
      add('T08', () => {
        const c = {ownerId:'m1',visibility:{mode:'selected',liveViewers:['m2']}};
        assertDeepEqual([W.canViewContract(c,'m2','live'), W.canViewContract(c,'m3','live')], [true, false]);
      });
      add('T09', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'private'}},'m2','inheritance'), false));
      add('T10', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'after_only'}},'m2','inheritance'), true));
      add('T11', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'selected',afterViewers:[]}},'m2','full'), true));
      add('T12', () => {
        const c = {ownerId:'m1',visibility:{mode:'selected',afterViewers:['m3']}};
        assertDeepEqual([W.canViewContract(c,'m2','full'), W.canViewContract(c,'m3','full')], [false, true]);
      });
      add('T13', () => assertEqual(W.canViewContract({ownerId:'m1',visibility:{mode:'???'}},'m2','live'), false));
      add('T14', () => assertEqual(W.visibilityLabel({visibility:{mode:'private'}}).key, 'private'));
      add('T15', () => assertEqual(W.monthlyEquivalent({cycle:'yearly',amount:12000}), 1000));
      add('T16', () => assertEqual(W.yearlyAmount({cycle:'monthly',amount:100}), 1200));
      add('T17', () => assertDeepEqual([W.paymentDateText({cycle:'monthly',day:15}), W.paymentDateText({cycle:'yearly',month:6,day:1})], ['毎月15日', '毎年6月1日']));
      add('T18', () => assertDeepEqual([W.daysInMonth(2024,2), W.daysInMonth(2026,2), W.clampDay(31,2026,4)], [29, 28, 30]));
      add('T19', () => assertDeepEqual([
        W.looksLikeSensitiveNumber('1234567'),
        W.looksLikeSensitiveNumber('123456'),
        W.looksLikeSensitiveNumber('1234-5678-9012-3456'),
        W.looksLikeSensitiveNumber('１２３４５６７'),
        W.looksLikeSensitiveNumber('通帳は金庫')
      ], [true, false, true, true, false]));
      add('T20', () => assertDeepEqual([W.isBuiltInSampleContract({id:1,name:'Netflix'}), W.isBuiltInSampleContract({id:1,name:'改名'})], [true, false]));
      add('T21', () => assertEqual(W.payMethodOf({}), 'credit_card'));
      add('T22', () => assertDeepEqual([W.daysUntilNext({cycle:'monthly',day:15}), W.daysUntilNext({cycle:'monthly',day:16})], [0, 1]));
      // APP-V2-AUTH(v95): Firebase Auth エラーコード→やさしい日本語（純関数・ネットワーク不要）
      add('T23', () => assertDeepEqual([
        W.cloudAuthErrorMessage({code:'auth/email-already-in-use'}).includes('すでに登録'),
        W.cloudAuthErrorMessage({code:'auth/invalid-credential'}).includes('違うようです'),
        W.cloudAuthErrorMessage({code:'auth/unknown-xyz'}).includes('もう一度お試しください'),
        W.cloudAuthErrorMessage(null).includes('もう一度お試しください')
      ], [true, true, true, true]));
      // APP-V2-SYNC P2b(v96): buildCloudDocs＝状態→Firestore doc群（純関数・ネットワーク不要）
      // 検証点: String(id)キー / undefined除去（Firestoreはundefined値を拒否） / '/'入りカテゴリ名はdocIDでなくdata / deep-copy / manifest形
      // stage-2b(v99): contracts/assets の visibility は getVisibility() 正規化で必ず書く
      //（家族の list read は where('visibility.mode',…) クエリ＝未設定 doc はクエリに載らないため）
      add('T24', () => {
        const input = {
          contracts: [{id:1,name:'A',cat:'保険',ownerId:'m1',cardId:undefined},{id:2,name:'B',cat:'x/y',ownerId:'m2',visibility:{mode:'selected',liveViewers:['m2']}}],
          members: [{id:'m1',name:'あ'}],
          categories: ['保険','x/y'],
          assets: [{id:5,type:'bank'}],
          cards: [{id:3,brand:'VISA'}],
          icons: {'x/y':'ti-tag'}, colors: {}, tcolors: {}
        };
        const out = W.buildCloudDocs(input);
        out.docs.contracts['1'].name = '書換', out.docs.categories.list.list.push('追加');
        assertDeepEqual([
          Object.keys(out.docs.contracts).sort(),
          ('cardId' in out.docs.contracts['1']),
          out.docs.categories.list.list.length === 3 && input.categories.length === 2, // deep-copy（出力書換が入力に波及しない）
          input.contracts[0].name === 'A',
          out.manifest,
          out.docs.contracts['1'].visibility,                       // 未設定 → all 正規化
          out.docs.contracts['2'].visibility,                       // 部分指定 → 欠損フィールド補完
          out.docs.assets['5'].visibility,                          // assets も同様に正規化
          input.contracts[1].visibility.afterViewers === undefined  // 正規化が入力へ波及しない
        ], [
          ['1','2'], false, true, true,
          {contracts:['1','2'],contractSecrets:[],assets:['5'],cards:['3'],members:['m1'],categories:['list']},
          {mode:'all',liveViewers:[],afterViewers:[]},
          {mode:'selected',liveViewers:['m2'],afterViewers:[]},
          {mode:'all',liveViewers:[],afterViewers:[]},
          true
        ]);
      });
      // APP-V2-SYNC P2b(v96): diffCloudManifest＝削除差分（純関数・prev null対応）
      add('T25', () => assertDeepEqual([
        W.diffCloudManifest(
          {contracts:['1','2'],assets:['5'],cards:[],members:['m1','m2'],categories:['list']},
          {contracts:['1'],assets:[],cards:['9'],members:['m1'],categories:['list']}
        ),
        W.diffCloudManifest(null, {contracts:['1'],assets:[],cards:[],members:[],categories:['list']})
      ], [
        {contracts:['2'],contractSecrets:[],assets:['5'],cards:[],members:['m2'],categories:[]},
        {contracts:[],contractSecrets:[],assets:[],cards:[],members:[],categories:[]}
      ]));
      // APP-V2-SYNC P2b(v96): 同期status/エラー文言（純関数・引数のみに依存）
      add('T26', () => assertDeepEqual([
        W.cloudSyncStatusText(null, null),
        W.cloudSyncStatusText({enabled:true,dirty:true}, null),
        W.cloudSyncStatusText({enabled:true,dirty:false,lastSyncAt:'2026-07-15T09:05:00'}, null),
        W.cloudSyncStatusText({enabled:true,dirty:false}, {code:'unavailable'}).includes('もう一度'),
        W.cloudSyncErrorMessage({code:'unavailable'}).includes('電波'),
        W.cloudSyncErrorMessage({code:'permission-denied'}).includes('ログイン'),
        W.cloudSyncErrorMessage(null).includes('うまく保存できませんでした')
      ], ['', '保存待ちの変更があります', '最終保存: 7月15日 09:05', true, true, true, true]));

      // APP-V2 stage-2b(v99): 招待リンク token 抽出＋受諾エラー文言（純関数・ネットワーク不要）
      add('T27', () => {
        const TOK = 'a'.repeat(32);
        assertDeepEqual([
          W.parseInviteTokenFromHash('#invite=' + TOK),
          W.parseInviteTokenFromHash('#invite=short'),          // 32桁hex以外は不可
          W.parseInviteTokenFromHash(''),
          W.parseInviteTokenFromHash(null),
          W.extractInviteToken(TOK),                            // 生 token
          W.extractInviteToken('  ' + TOK + '  '),              // 前後空白許容
          W.extractInviteToken('https://x.github.io/app.html#invite=' + TOK), // URL全体貼付
          W.extractInviteToken('#invite=' + TOK + 'ff'),        // 34桁は不一致（境界チェック）
          W.extractInviteToken('でたらめ'),
          W.cloudAcceptErrorMessage({code:'functions/permission-denied'}).includes('確認コード'),
          W.cloudAcceptErrorMessage({code:'functions/failed-precondition'}).includes('再発行'),
          W.cloudAcceptErrorMessage({code:'functions/not-found'}).includes('リンク'),
          W.cloudAcceptErrorMessage(null).includes('もう一度'),
          W.sharedOwnerColor('uidAbc') === W.sharedOwnerColor('uidAbc'), // 決定的
          /^#[0-9A-Fa-f]{6}$/.test(W.sharedOwnerColor('uidXyz'))         // PALETTE の hex
        ], [
          TOK, null, null, null,
          TOK, TOK, TOK, null, null,
          true, true, true, true,
          true, true
        ]);
      });

      // APP-INVITE-SECRET-SPLIT(v108): buildCloudDocs は所在メモ(secret)を契約docから剥がし、
      // owner-only の contractSecrets へ退避する（空secretはdoc化しない＝manifest差分で掃去）。
      // 家族可視の cardBrand/cardLast4 は契約docに残す。cross-account read 経路に secret を載せない。
      add('T28', () => {
        const input = {
          contracts: [
            {id:1,name:'A',ownerId:'m1',secret:'金庫の中',cardBrand:'VISA',cardLast4:'1234'},
            {id:2,name:'B',ownerId:'m1',secret:''}
          ],
          members: [], categories: [], assets: [], cards: [],
          icons: {}, colors: {}, tcolors: {}
        };
        const out = W.buildCloudDocs(input);
        assertDeepEqual([
          ('secret' in out.docs.contracts['1']),   // 契約docから除去
          ('secret' in out.docs.contracts['2']),   // 空でも除去
          out.docs.contracts['1'].cardBrand,       // カード会社は残す（家族可視）
          out.docs.contracts['1'].cardLast4,       // 下4桁は残す（家族可視）
          out.docs.contractSecrets['1'],           // owner-only へ退避
          ('2' in out.docs.contractSecrets),       // 空secretはdoc作らない
          out.manifest.contractSecrets,            // manifest にも id1 のみ
          input.contracts[0].secret === '金庫の中' // 入力へ波及しない（deep-copy）
        ], [
          false, false, 'VISA', '1234',
          {cid:'1',secret:'金庫の中'}, false, ['1'], true
        ]);
      });

      // APP-MEMBER-PHOTO(v122): validMemberPhoto/sanitizeMemberPhoto＝data:image のみ許可・SVG/スキーム細工/超過を排除
      add('T29', () => {
        const ok = 'data:image/jpeg;base64,AAAA';
        const big = 'data:image/jpeg;base64,' + 'A'.repeat(121*1024);
        assertDeepEqual([
          W.validMemberPhoto(ok),
          W.validMemberPhoto('data:image/png;base64,AAAA'),
          W.validMemberPhoto('data:image/webp;base64,AAAA'),
          W.validMemberPhoto('javascript:alert(1)'),
          W.validMemberPhoto('data:text/html;base64,AAAA'),
          W.validMemberPhoto('data:image/svg+xml;base64,AAAA'), // SVGはscript実行可能性→拒否
          W.validMemberPhoto(big),                              // 120KB超→拒否
          W.validMemberPhoto(null),
          W.sanitizeMemberPhoto({id:'m1',photo:'javascript:x'}).photo === undefined,
          W.sanitizeMemberPhoto({id:'m1',photo:ok}).photo === ok,
          ('photo' in W.sanitizeMemberPhoto({id:'m1'})) === false, // 無photoはno-op
          W.avatarHtml({name:'太郎',color:'#185FA5',photo:ok},'av').startsWith('<img'),
          W.avatarHtml({name:'太郎',color:'#185FA5'},'av').includes('太'),
          W.avatarHtml({name:'太郎',photo:'javascript:x'},'av').startsWith('<span') // 不正photoは頭文字fallback（inline要素＝owner-pill文脈で改行を生まない）
        ], [
          true, true, true, false, false, false, false, false,
          true, true, true,
          true, true, true
        ]);
      });
      // APP-MEMBER-PHOTO(v122): buildCloudDocs は member.photo をそのまま members doc へ通す（本人のみ可読・rules 側で家族非開示）
      add('T30', () => {
        const ok = 'data:image/jpeg;base64,BBBB';
        const out = W.buildCloudDocs({
          contracts: [], members: [{id:'m1',name:'あ',color:'#185FA5',photo:ok},{id:'m2',name:'い',color:'#D4537E'}],
          categories: [], assets: [], cards: [], icons: {}, colors: {}, tcolors: {}
        });
        assertDeepEqual([
          out.docs.members['m1'].photo,
          ('photo' in out.docs.members['m2']),
          out.manifest.members
        ], [ok, false, ['m1','m2']]);
      });
      // APP-PLAN-LIMIT-SYNC 第2弾(v127): 無料プランの共有上限(1名)エンフォース。既存2件(pending+accepted)は
      // サンプルデータのまま維持＝grandfather(新規発行のみブロック)を、初期状態(isPaid=false)がそのまま検証する。
      add('T31', () => {
        assertDeepEqual([W.inviteShareCap(false), W.inviteShareCap(true)], [1, 5]);
      });
      add('T32', () => {
        // 初期状態: サンプルで pending+accepted=2件既存・isPaid=false → 新規ブロック(超過分は解除されない)
        const blocked = W.checkInvitationLimits();
        assertDeepEqual([blocked && blocked.showUpgrade, typeof (blocked && blocked.message)], [true, 'string']);
      });

      snapshots.S01 = W.document.querySelector('#contract-list').innerHTML;
      snapshots.S02 = {
        totalAmount: W.document.querySelector('#total-amount').textContent,
        yearly: W.document.querySelector('#yearly').textContent,
        totalCount: W.document.querySelector('#total-count').textContent,
        urgentCount: W.document.querySelector('#urgent-count').textContent
      };
      W.showDetail(2);
      snapshots.S03 = W.document.querySelector('#detail-content').innerHTML;
      W.showDetail(8);
      snapshots.S04 = W.document.querySelector('#detail-content').innerHTML;
      W.startPreview('m2');
      snapshots.S07 = W.document.querySelector('#contract-list').innerHTML;
      W.exitPreview();
      let captured = '';
      const fake = {document:{write:h => captured = h, close(){}}};
      W.open = () => fake;
      W.doExport();
      snapshots.S05 = captured;
      W.persistState();
      snapshots.S06 = normalizeStoredState(localStorage.getItem('kizuna-baton:data:v20'));

      if(captureMode){
        document.getElementById('capture').textContent = JSON.stringify(snapshots, null, 2);
      }else{
        const goldens = await fetch('/tests/goldens.json').then(r => r.json());
        add('S01', () => assertEqual(snapshots.S01, goldens.S01));
        add('S02', () => assertDeepEqual(snapshots.S02, goldens.S02));
        add('S03', () => assertEqual(snapshots.S03, goldens.S03));
        add('S04', () => assertEqual(snapshots.S04, goldens.S04));
        add('S05', () => assertEqual(snapshots.S05, goldens.S05));
        add('S06', () => assertDeepEqual(snapshots.S06, goldens.S06));
        add('S07', () => assertEqual(snapshots.S07, goldens.S07));
      }

      let pass = 0;
      for(const t of tests){
        try{
          await t.fn();
          pass++;
          log(t.id, true, '');
        }catch(e){
          log(t.id, false, e.message);
        }
      }
      const ok = pass === tests.length;
      document.getElementById('result').className = ok ? 'pass' : 'fail';
      document.getElementById('result').textContent = captureMode ? `CAPTURE READY (${tests.length} tests defined)` : (ok ? `ALL PASS (${pass}/${tests.length})` : `FAIL (${pass}/${tests.length})`);
    }

    run().catch(e => {
      document.getElementById('result').className = 'fail';
      document.getElementById('result').textContent = 'FAIL';
      log('BOOT', false, e.stack || e.message);
    });
  </script>
</body>
</html>
